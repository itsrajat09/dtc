<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Transport E-Ticket Replica</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style11.css">
</head>

<body>

<div class="screen-container">

    <div class="top-nav">
        <a href="index10.html"><div style="cursor: pointer; font-size: 22px;" onclick="location.reload()">✕</div></a>
        <div class="issue-link" onclick="openEditModal()">
            <div class="warning-icon">
                <svg width="28" height="24" viewBox="0 0 24 22">
                    <path d="M12 2 L22 20 L2 20 Z" fill="#C9D36A" stroke="#2A1F1B" stroke-width="1.2" stroke-linejoin="round"/>
                    <rect x="11" y="7" width="2" height="7" rx="1" fill="#1E1E1E"/>
                    <circle cx="12" cy="17" r="1.3" fill="#1E1E1E"/>
                </svg>
            </div>
            Issue with ticket?
        </div>
        <div style="cursor: pointer;">View all tickets</div>
    </div>


    <div id="ticketView" class="view active">
        <div class="ticket-card">
            <div class="dept-title">Transport Dept. of Delhi</div>

            <div class="top-details">
                <span id="display-bus-reg">DL1PD4722</span>
                <span id="display-total-fare">₹4.62</span>
            </div>

            <div class="divider"></div>

            <div class="data-row">
                <div>
                    <div class="label">Bus Route</div>
                    <div class="value" id="display-route">254A</div>
                </div>
                <div class="text-right">
                    <div class="label">Fare</div>
                    <div class="value_fare" id="display-fare">₹5.0</div>
                </div>
            </div>

            <div class="data-row">
                <div>
                    <div class="label">Booking Time</div>
                    <div class="value" id="display-time">23 Feb, 26 | 11:08 AM</div>
                </div>
                <div class="text-right">
                    <div class="label">Tickets</div>
                    <div class="value" id="display-tickets">1</div>
                </div>
            </div>

            <div style="margin-bottom:15px">
                <div class="label">Starting stop</div>
                <div class="value" id="display-start">Peera Garhi Metro Station</div>
            </div>

            <div style="margin-bottom:15px">
                <div class="label">Ending stop</div>
                <div class="value" id="display-end">Peeragarhi Chowk Flyover</div>
            </div>

            <div class="ticket-id">T23022026bdfcd4d8ac</div>

           <button class="qr-button" onclick="showQR()">
    <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M2 2h7v7H2V2zm1 1v5h5V3H3zm1 1h3v3H4V4zm11-3h7v7h-7V2zm1 1v5h5V3h-5zm1 1h3v3h-3V4zM2 15h7v7H2v-7zm1 1v5h5v-5H3zm1 1h3v3H4v-3zM10 3h2v2h-2V3zm2 3h2v2h-2V6zM3 10h2v2H3v-2zm3 2h2v2H6v-2zm4-2h3v3h-3v-3zm4 1h4v2h-4v-2zm5-1h2v2h-2v-2zm-8 5h2v2h-2v-2zm4 0h3v3h-3v-3zm4 0h2v2h-2v-2zm-4 4h4v2h-4v-2zm5 1h2v2h-2v-2zm-10-1h2v3h-2v-3z"/>
    </svg>
    Show QR code
</button>

            <div class="footer">
                <div class="ondc-logo">
                    <img src="ondc.png" width="50">
                </div> 
                <div class="network">NETWORK</div>
            </div>
        </div>
    </div>


    <div id="qrView" class="view">
    <div class="qr-display-container">
        <div class="qr-card">
            <img onclick="hideQR()"
            src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=DELHI-TRANS-T23022026bdfcd4d8ac-SECURE-DYNAMIC-V3-ECC-HIGH&ecc=H">
        </div>
    </div>
</div>

</div>


<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Edit Ticket Details</h3>

        <div class="input-group">
            <label>Bus Registration</label>
            <input type="text" id="input-bus-reg">
        </div>

        <div class="input-group">
            <label>Total Fare (Top Right)</label>
            <select id="input-total-fare">
                <option>₹4.62</option>
                <option>₹9.25</option>
                <option>₹13.75</option>
                <option>₹18.5</option>
                <option>₹22.79</option>
            </select>
        </div>

        <div class="input-group">
            <label>Bus Route</label>
            <input type="text" id="input-route">
        </div>

        <div class="input-group">
            <label>Fare Amount</label>
            <select id="input-fare" >
                <option>₹5.0</option>
                <option>₹10.0</option>
                <option>₹15.0</option>
                <option>₹20.0</option>
                <option>₹25.0</option>
            </select>
        </div>

        <div class="input-group">
            <label>Number of Tickets</label>
            <input type="text" id="input-tickets">
        </div>

        <div class="input-group">
            <label>Starting Stop</label>
            <input type="text" id="input-start">
        </div>

        <div class="input-group">
            <label>Ending Stop</label>
            <input type="text" id="input-end">
        </div>

        <div class="input-group">
            <label>App Background Color</label>
            <select id="input-bg-color">
                <option value="#0974ae">Dark_Blue</option>
                <option value="#099484">light_blue</option>
                <option value="#de732c">orange</option>
                <option value="#1F1F1F">Dark Mode</option>
            </select>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-save" onclick="saveDetails()">Save Changes</button>
        </div>
    </div>
</div>


<script>
    function showQR(){
    document.getElementById("ticketView").classList.remove("active");
    document.getElementById("qrView").classList.add("active");
}
function showTicket(){
    document.getElementById("qrView").classList.remove("active");
    document.getElementById("ticketView").classList.add("active");
}
function hideQR(){
    document.getElementById("qrView").classList.remove("active");
    document.getElementById("ticketView").classList.add("active");
}
    // SYSTEM CLOCK LOGIC: Pulls current time and subtracts 20 mins
    function updateTicketTime() {
        const systemDate = new Date(); 
        systemDate.setMinutes(systemDate.getMinutes() - 20); // Subtract 20 mins

        const day = systemDate.getDate().toString().padStart(2, '0');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const month = months[systemDate.getMonth()];
        const year = systemDate.getFullYear().toString().slice(-2);

        let hours = systemDate.getHours();
        const minutes = systemDate.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;

        const finalString = `${day} ${month}, ${year} | ${hours}:${minutes} ${ampm}`;
        document.getElementById('display-time').innerText = finalString;
    }

    window.onload = updateTicketTime;

    function openEditModal(){
        document.getElementById("input-bus-reg").value = document.getElementById("display-bus-reg").innerText;
        document.getElementById("input-total-fare").value = document.getElementById("display-total-fare").innerText;
        document.getElementById("input-route").value = document.getElementById("display-route").innerText;
        document.getElementById("input-fare").value = document.getElementById("display-fare").innerText;
        document.getElementById("input-tickets").value = document.getElementById("display-tickets").innerText;
        document.getElementById("input-start").value = document.getElementById("display-start").innerText;
        document.getElementById("input-end").value = document.getElementById("display-end").innerText;
        
        document.getElementById("editModal").classList.add("active");
    }

    function closeEditModal(){
        document.getElementById("editModal").classList.remove("active");
    }

    function saveDetails(){
        document.getElementById("display-bus-reg").innerText = document.getElementById("input-bus-reg").value;
        document.getElementById("display-total-fare").innerText = document.getElementById("input-total-fare").value;
        document.getElementById("display-route").innerText = document.getElementById("input-route").value;
        document.getElementById("display-fare").innerText = document.getElementById("input-fare").value;
        document.getElementById("display-tickets").innerText = document.getElementById("input-tickets").value;
        document.getElementById("display-start").innerText = document.getElementById("input-start").value;
        document.getElementById("display-end").innerText = document.getElementById("input-end").value;

        // Apply the new background color
        let selectedColor = document.getElementById("input-bg-color").value;
        document.body.style.backgroundColor = selectedColor;

        closeEditModal();
    }
</script>

</body>
</html>
