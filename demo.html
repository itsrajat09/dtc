<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delhi Transport E-Ticket Replica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #E47D3A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vdh;
            padding: 0px 15px 15px 15px;
            overflow: hidden;
        }

        .screen-container {
            width: 100%;
            max-width: 400px;
            height: 90vdh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Nav - Persistent */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.9);
            padding: 10px ;
            font-size: 14px;
            z-index: 10;
        }

        .issue-link {
            display: flex;
            align-items: center;
            gap:6px;
        }

        .warning-icon {
            width: 22px;
            height: 22px;
            background-color: #FDE047;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 1px;
            color: black;
            font-weight: 900;
            font-size: 11px;
            border: 1px solid #000;
        }

        /* Views */
        .view {
            display: none;
            width: 100%;
            flex-direction: column;
            margin-top: 40px;
        }

        .view.active {
            display: flex;
        }

        /* Ticket Card Styles */
        .ticket-card {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 24px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .dept-title {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 20px;
        }

        .top-details {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            color: #3C4043;
            margin-bottom: 8px;
        }

        .divider {
            height: 1.5px;
            background-color: #5F6368;
            margin: 10px 0 15px 0;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .label { font-size: 13px; color: #5F6368; margin-bottom: 4px; }
        .value { font-size: 16px; color: #202124; font-weight: 400; }
        .text-right { text-align: right; }

        .ticket-id {
            text-align: center;
            font-size: 12px;
            color: #70757A;
            margin: 20px 0 15px 0;
        }

        /* QR BUTTON — Pixel Accurate */

.qr-button {
    width: 100%;
    background: linear-gradient(180deg, #BFE9E4 0%, #9FD8D1 100%);                 /* Softer mint green */
    border: 1.5px solid #5F9F98;         /* Slightly darker thin border */
    padding: 16px 0;                     /* More vertical padding */
    border-radius: 14px;                 /* More rounded like image */
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    font-size: 16px;                     /* Slightly smaller */
    font-weight: 500;
    color: #083B34;                      /* Darker teal text */
    cursor: pointer;
    transition: 0.2s ease;
}
.qr-button:hover {
    background: linear-gradient(180deg, #C9F1EC 0%, #A6E0D9 100%);
}

/* Button Press Effect */
.qr-button:active {
    transform: scale(0.98);
}

/* QR Icon — Better Proportion */
.qr-button svg {
    width: 22px;
    height: 22px;
}


/* QR DISPLAY SCREEN */

.qr-display-container {
    background: #ffffff;
    padding: 12px;
    border-radius: 10px;                 /* Slightly rounded like mobile */
    width: 300px;
    height: 300px;
    margin: 70px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

.qr-display-container img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
}


/* FOOTER (ONDC NETWORK) */

.footer {
    margin-top: 30px;                    /* More spacing below button */
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.8px;
    color: #1F1F1F;
}

.ondc-text {
    color: #1A73E8;                       /* Proper ONDC blue */
    margin-right: 4px;
}
    </style>
</head>
<body>

    <div class="screen-container">
        <div class="top-nav">
            <div style="cursor: pointer; font-size: 22px;" onclick="location.reload()">✕</div>
            <div class="issue-link">
                <div class="warning-icon">!</div>
                Issue with ticket?
            </div>
            <div style="cursor: pointer;">View all tickets</div>
        </div>

        <div id="ticketView" class="view active">
            <div class="ticket-card">
                <div class="dept-title">Transport Dept. of Delhi</div>
                
                <div class="top-details">
                    <span>DL1PD4722</span>
                    <span>₹4.62</span>
                </div>

                <div class="divider"></div>

                <div class="data-row">
                    <div>
                        <div class="label">Bus Route</div>
                        <div class="value">254A</div>
                    </div>
                    <div class="text-right">
                        <div class="label">Fare</div>
                        <div class="value">₹5.0</div>
                    </div>
                </div>

                <div class="data-row">
                    <div>
                        <div class="label">Booking Time</div>
                        <div class="value">23 Feb, 26 | 11:08 AM</div>
                    </div>
                    <div class="text-right">
                        <div class="label">Tickets</div>
                        <div class="value">1</div>
                    </div>
                </div>

                <div style="margin-bottom:15px">
                    <div class="label">Starting stop</div>
                    <div class="value">Peera Garhi Metro Station</div>
                </div>

                <div style="margin-bottom:15px">
                    <div class="label">Ending stop</div>
                    <div class="value">Peeragarhi Chowk Flyover</div>
                </div>

                <div class="ticket-id">T23022026bdfcd4d8ac</div>

                <button class="qr-button" onclick="showQR()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm-3 0h2v2h-2v-2zm3 3h3v2h-3v-2zm-3 3h2v2h-2v-2zm3 0h3v2h-3v-2zm0-3h-3v-3h3v3z" />
                    </svg>
                    Show QR code
                </button>

                <div class="footer">
                    <span class="ondc-text">ONDC</span> NETWORK
                </div>
            </div>
        </div>

        <div id="qrView" class="view">
            <div class="qr-display-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=DELHI-TRANS-T23022026bdfcd4d8ac-SECURE-DYNAMIC-V3-ECC-HIGH&ecc=H" alt="Ticket QR">
            </div>
        </div>
    </div>

    <script>
        function showQR() {
            document.getElementById('ticketView').classList.remove('active');
            document.getElementById('qrView').classList.add('active');
        }
    </script>
</body>
</html>
