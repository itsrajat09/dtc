<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Transport E-Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body {
    background-color: #ef8e38;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* Layout */
.viewport-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* Header */
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 16px;
    color: #ffffff;
}

.nav-right {
    display: flex;
    gap: 16px;
    font-size: 13.5px;
}

.nav-item {
    text-decoration: underline;
    cursor: pointer;
}

/* Content */
.content {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 60px 16px 0;
}

.ticket {
    background: #ffffff;
    width: 100%;
    max-width: 380px;
    border-radius: 4px;
    padding: 24px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
}

.agency-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 22px;
}

.bus-row {
    display: flex;
    justify-content: space-between;
}

.bus-reg {
    font-size: 18px;
    font-weight: 700;
}

.total-fare {
    font-size: 16px;
    font-weight: 600;
}

.divider {
    height: 1px;
    background-color: #e0e0e0;
    margin: 12px 0 20px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    row-gap: 18px;
    text-align: left;
    margin-bottom: 22px;
}

.lbl {
    font-size: 12px;
    color: #5f6368;
}

.val {
    font-size: 15px;
    font-weight: 600;
}

.tr { text-align: right; }

/* Stops */
.stops {
    text-align: left;
    margin-bottom: 25px;
}

.serial {
    color: #80868b;
    font-size: 11px;
    margin-bottom: 15px;
}

/* QR Button */
.qr-btn {
    width: 100%;
    background-color: #d2f1eb;
    border: 1px solid #99d6cb;
    border-radius: 4px;
    padding: 10px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
}

/* QR Screen */
.qr-screen {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.qr-box {
    background: white;
    padding: 20px;
    border-radius: 8px;
}

/* Footer */
.ondc-area {
    margin-top: 25px;
}

.blue { color: #1a73e8; }
</style>
</head>

<body>

<div class="viewport-wrapper">

    <div class="top-nav">
        <div onclick="location.reload()">✕</div>
        <div class="nav-right">
            <div class="nav-item" onclick="openEdit()">Support</div>
        </div>
    </div>

    <!-- TICKET VIEW -->
    <div class="content" id="ticketView">
        <div class="ticket">

            <div class="agency-title">Transport Dept. of Delhi</div>

            <div class="bus-row">
                <div id="ticketCode" class="bus-reg">DL1PD4722</div>
                <div id="fare" class="total-fare">₹4.62</div>
            </div>

            <div class="divider"></div>

            <div class="grid">
                <div>
                    <span class="lbl">Bus route</span>
                    <span id="busRoute" class="val">254A</span>
                </div>
                <div class="tr">
                    <span class="lbl">Fare</span>
                    <span id="fare2" class="val">₹5.0</span>
                </div>

                <div>
                    <span class="lbl">Booking time</span>
                    <span id="bookingTime" class="val"></span>
                </div>
                <div class="tr">
                    <span class="lbl">Tickets</span>
                    <span class="val">1</span>
                </div>
            </div>

            <div class="stops">
                <div class="lbl">Starting stop</div>
                <div id="startStop" class="val">Peera Garhi Metro Station</div>

                <div class="lbl" style="margin-top:18px;">Ending stop</div>
                <div id="endStop" class="val">Peeragarhi Chowk Flyover</div>
            </div>

            <div id="ticketId" class="serial">T23022026bdfcd4d8ac</div>

            <button class="qr-btn" onclick="showQR()">Show QR Code</button>

            <div class="ondc-area">
                <span class="blue">ONDC</span> NETWORK
            </div>

        </div>
    </div>

    <!-- QR VIEW -->
    <div class="qr-screen" id="qrView">
        <div class="qr-box">
            <div id="qrcode"></div>
            <button class="qr-btn" style="margin-top:15px;" onclick="closeQR()">Back</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

/* Dynamic Booking Time */
function formatDateTime() {
    const now = new Date();
    const options = { day:'2-digit', month:'short', year:'2-digit' };
    const date = now.toLocaleDateString('en-US', options);
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2,'0');
    const ampm = hours >= 12 ? 'PM':'AM';
    hours = hours % 12 || 12;
    return `${date} | ${hours}:${minutes} ${ampm}`;
}
bookingTime.textContent = formatDateTime();


/* QR Logic */
function showQR() {
    ticketView.style.display = "none";
    qrView.style.display = "flex";
    qrcode.innerHTML = "";
    new QRCode(qrcode, {
        text: ticketId.textContent.trim(),
        width: 200,
        height: 200
    });
}

function closeQR() {
    qrView.style.display = "none";
    ticketView.style.display = "flex";
}


/* Edit Logic */
function openEdit() {
    const newStart = prompt("Edit Starting Stop", startStop.textContent);
    if(newStart !== null) startStop.textContent = newStart;

    const newEnd = prompt("Edit Ending Stop", endStop.textContent);
    if(newEnd !== null) endStop.textContent = newEnd;
}

</script>

</body>
</html>
